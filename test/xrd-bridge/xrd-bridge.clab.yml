name: flapmusik-xrd-bridge
# The prefix is prepended to container node names. We override the default
# "clab-<lab-name>-" prefix here by using the "__lab-name" magic value.
# Containerlab replaces it with the lab name defined above, so the XRd
# container ends up named "flapmusik-xrd-bridge-xrd1". The "bridge" kind node
# below is NOT prefixed - it refers to a pre-existing Linux bridge on the host
# by its exact name (see the Makefile, which creates it and enslaves the
# physical interface).
prefix: __lab-name

mgmt:
  network: flapmusik-xrd-bridge
  ipv4-subnet: auto
  ipv6-subnet: auto

topology:
  kinds:
    xrd:
      image: ${IMAGE_PATH}ios-xr/xrd-control-plane:25.3.1
      startup-config: xrd-startup.conf
  nodes:
    # The single XRd router. Its data-plane port Gi0/0/0/0 carries the
    # 10.123.0.100/24 address (configured in xrd-startup.conf) and is bridged
    # out to the host's physical enx6c6e0741e7a9 interface.
    xrd1:
      kind: xrd

    # Pre-existing Linux bridge on the host that stitches the XRd data-plane
    # veth to the physical NIC. The Makefile's "bridge-up" target creates this
    # bridge and enslaves enx6c6e0741e7a9 into it before deploy.
    br-xrd:
      kind: bridge

  links:
    # XRd Gi0/0/0/0 <-> host bridge br-xrd (which also has the physical
    # enx6c6e0741e7a9 as a member -> XRd is bridged onto that L2 segment).
    - endpoints: ["xrd1:Gi0-0-0-0", "br-xrd:xrd1-eth0"]
